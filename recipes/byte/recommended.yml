drupal/drupal_cms_accessibility_tools:
  title: 'Accessibility Tools'
  type: recipe
  logo: https://git.drupalcode.org/project/editoria11y/-/avatar
  core: '^11.3'
  machineName: drupal_cms_accessibility_tools
  body:
    summary: 'Adds automated checks to help ensure content conforms to web accessibility guidelines.'
  packageName: drupal/drupal_cms_accessibility_tools

drupal/drupal_cms_ai:
  title: 'AI Assistant'
  type: recipe
  logo: null
  core: '^11.3'
  machineName: drupal_cms_ai
  body:
    summary: 'Adds integration with AI services, such as alt text generation and a chat bot to assist with site building. You can choose from several providers: amazee.ai, OpenAI or Anthropic.'
  packageName: drupal/drupal_cms_ai

drupal/drupal_cms_google_analytics:
  title: 'Google Tag'
  type: recipe
  logo: https://git.drupalcode.org/project/google_tag/-/avatar
  core: '^11.3'
  machineName: drupal_cms_google_analytics
  body:
    summary: 'Adds Google Tag and Google Tag Manager to use Google measurement and advertising products like Google Ads, Google Analytics, Campaign Manager, Display & Video 360, and Search Ads 360. Requires a Google Tag or GTM ID.'
  packageName: drupal/drupal_cms_google_analytics

drupal/mailchimp_signup_forms:
  title: 'Mailchimp'
  type: recipe
  logo: https://git.drupalcode.org/project/mailchimp/-/avatar
  core: '>=11.2'
  machineName: mailchimp_signup_forms
  body:
    summary: 'Adds integration with Mailchimp, creating signup forms for each audience. Requires authentication with Mailchimp.'
  packageName: drupal/mailchimp_signup_forms
